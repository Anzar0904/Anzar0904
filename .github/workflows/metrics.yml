name: Generate Metrics

on:
  schedule:
    - cron: "30 0 * * *"  # daily at 00:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics-generated.svg
          # A classic PAT with `repo` + `read:user` scopes, stored as METRICS_TOKEN,
          # is required — the default GITHUB_TOKEN doesn't have enough scope for
          # the plugins enabled below (isocalendar, achievements, habits).
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: Anzar0904
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_habits: yes
          plugin_achievements: yes
          plugin_isocalendar: yes
          config_timezone: Asia/Kolkata
