<svg viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AIOS — Anzar Operating System">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="100%" stop-color="#0D1219"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#A855F7"/>
      <stop offset="70%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="160" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#A855F7" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="225" y1="0" x2="225" y2="160"/>
    <line x1="450" y1="0" x2="450" y2="160"/>
    <line x1="675" y1="0" x2="675" y2="160"/>
  </g>
  <rect x="60" y="28" width="780" height="1" fill="url(#rule)" opacity="0.6"/>
  <text x="60" y="102" font-family="'SF Mono', 'Fira Code', monospace" font-size="52" font-weight="700" fill="url(#accent)" letter-spacing="-1">AIOS</text>
  <text x="230" y="88" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#A855F7" opacity="0.7" letter-spacing="3">ANZAR OPERATING SYSTEM</text>
  <text x="231" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#94A3B8" letter-spacing="0.3">AI-native systems · agents · infrastructure</text>
  <rect x="60" y="130" width="780" height="1" fill="url(#rule)" opacity="0.6"/>
  <circle cx="60" cy="28" r="3" fill="#A855F7">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="840" cy="130" r="3" fill="#22D3EE">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>